<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Wobbly Messenger</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#14131c" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Wobbly" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; margin: 0; overflow: hidden; }
  body { background: #14131c; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

  input, button { font-family: inherit; }
  button { -webkit-appearance: none; }

  /* Spring-like overshoot entrance for bubbles: cubic-bezier fakes
     a damped spring (overshoots past 1 then settles). */
  .bubble-row { animation: fadeSlideIn 0.28s ease forwards; opacity: 0; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .bubble-spring {
    animation: springIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    transform: scale(0.85);
  }
  @keyframes springIn {
    0%   { transform: scale(0.8); }
    55%  { transform: scale(1.05); }
    80%  { transform: scale(0.97); }
    100% { transform: scale(1); }
  }

  .pop-in { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.6) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .fade-in { animation: fadeIn 0.2s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .sheet-in { animation: sheetIn 0.42s cubic-bezier(0.22, 1.15, 0.4, 1) forwards; }
  @keyframes sheetIn {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .typing-dot { animation: bounce 1.1s infinite ease-in-out; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .breathe { animation: breathe 2.4s infinite ease-in-out; }
  @keyframes breathe {
    0%, 100% { opacity: 0.75; transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.15); }
  }

  .tap-shrink { transition: transform 0.12s ease; }
  .tap-shrink:active { transform: scale(0.88); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react" src="app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
